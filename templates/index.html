<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Todo App</title>
    <style>
        /* Center everything on the page */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 350px;
        }

        h2 { color: #333; }

        form { margin-bottom: 20px; }

        input[type="text"] {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        button {
            padding: 8px 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #fff;
            border-bottom: 1px solid #eee;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Styling the checkbox color */
        input[type="checkbox"] {
            accent-color: #007bff; /* Makes the checkbox blue */
            transform: scale(1.2);
            margin-right: 10px;
        }

        .delete-btn {
            color: #dc3545;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>My To-Do List</h2>
        <form action="/add" method="POST">
            <input type="text" name="todo" placeholder="Enter a task" required>
            <button type="submit">Add</button>
        </form>
        <ul>
            {% for todo in todos %}
                <li>
                    <div>
                        <input type="checkbox"> 
                        <span>{{ todo.task }}</span>
                    </div>
                    <a href="/delete/{{ loop.index0 }}" class="delete-btn">Delete</a>
                </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
